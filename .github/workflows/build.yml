name: Build Nook

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            ext: ""
            icon_ext: png
            pkg: tar
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ""
            icon_ext: icns
            pkg: dmg
          - os: windows-latest
            platform: win32
            arch: x64
            ext: .exe
            icon_ext: ico
            pkg: innosetup

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Build backend
        working-directory: backend
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller nook-backend.spec

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Generate macOS icon
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          mkdir build/nook.iconset
          for size in 16 32 128 256 512; do
            sips -z "$size" "$size" build/nook.png --out "build/nook.iconset/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z "$double" "$double" build/nook.png --out "build/nook.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns build/nook.iconset -o build/nook.icns

      - name: Build frontend
        working-directory: frontend
        shell: bash
        run: |
          npm ci
          npm run build
          npx @electron/packager . Nook --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --out=release --overwrite --icon=../build/nook.${{ matrix.icon_ext }}
          if [ "${{ matrix.platform }}" = "darwin" ]; then
            resources="release/Nook-darwin-${{ matrix.arch }}/Nook.app/Contents/Resources"
          else
            resources="release/Nook-${{ matrix.platform }}-${{ matrix.arch }}/resources"
          fi
          mkdir -p "$resources/backend"
          cp ../backend/dist/nook-backend${{ matrix.ext }} "$resources/backend/"

      - name: Package (tar.gz)
        if: matrix.pkg == 'tar'
        working-directory: frontend/release
        run: tar czf "$GITHUB_WORKSPACE/nook-linux-x64.tar.gz" Nook-linux-x64

      - name: Package (dmg)
        if: matrix.pkg == 'dmg'
        working-directory: frontend/release
        run: |
          mkdir dmg-root
          cp -R Nook-darwin-arm64/Nook.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname Nook -srcfolder dmg-root -ov -format UDZO "$GITHUB_WORKSPACE/nook-macos-arm64.dmg"

      - name: Package (Inno Setup)
        if: matrix.pkg == 'innosetup'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest "https://github.com/jrsoftware/issrc/releases/download/is-6_7_1/innosetup-6.7.1.exe" -OutFile "$env:TEMP\is.exe"
          Start-Process -Wait "$env:TEMP\is.exe" -ArgumentList "/VERYSILENT /CURRENTUSER /NORESTART"
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          $version = node -p "require('./frontend/package.json').version"
          & $iscc "/DMyAppVersion=$version" Nook.iss

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: |
            nook-linux-x64.tar.gz
            nook-macos-arm64.dmg
            installer/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag from package version
        id: release
        shell: bash
        run: |
          version=$(node -p "require('./frontend/package.json').version")
          tag="v$version"

          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "$tag" ]; then
            echo "Workflow tag ${GITHUB_REF_NAME} does not match package version $tag" >&2
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
            tagged_commit=$(git rev-list -n 1 "$tag")
            if [ "$tagged_commit" != "$GITHUB_SHA" ]; then
              echo "Tag $tag already points to $tagged_commit, not $GITHUB_SHA" >&2
              exit 1
            fi
          else
            git tag "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            tar/nook-linux-x64.tar.gz
            dmg/nook-macos-arm64.dmg
            innosetup/installer/*.exe
          draft: true
